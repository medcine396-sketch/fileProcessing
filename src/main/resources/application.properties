spring.application.name=FileProcessing

# H2 内嵌数据库配置（仅用于账单批处理中间存储）
spring.datasource.url=jdbc:h2:mem:fileprocessing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 开启 H2 控制台（开发调试用，可按需关闭）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 简单邮件配置：用于创建 JavaMailSender Bean（请根据实际 SMTP 修改）
spring.mail.host=localhost
spring.mail.port=25

# 批处理时间窗（示例：20:00-22:00），用于结算任务控制
batch.window.start=00:00
batch.window.end=23:59

# 没有新 CSV 到达后的静默时间（分钟）再触发结算
batch.settlement.quiet-minutes=1
